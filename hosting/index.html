<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Antigravity</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --bg: #0a0e1a;
            --surface: rgba(255, 255, 255, .06);
            --border: rgba(255, 255, 255, .08);
            --text: #e2e8f0;
            --muted: #94a3b8;
            --accent: #818cf8;
            --accent2: #06b6d4;
            --agent-bg: rgba(99, 102, 241, .1);
            --user-bg: rgba(6, 182, 212, .15);
            --green: #22c55e;
            --red: #ef4444;
        }

        html,
        body {
            height: 100%;
            height: 100dvh;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100%;
            height: 100dvh;
            max-width: 500px;
            margin: 0 auto;
            overflow: hidden
        }

        /* Header */
        .header {
            padding: 12px 16px;
            background: rgba(10, 14, 26, .95);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(20px);
            z-index: 10
        }

        .header .bell-btn {
            margin-left: auto;
            background: none;
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            position: relative;
            transition: all .2s
        }

        .header .bell-btn.active {
            border-color: var(--green);
            box-shadow: 0 0 8px rgba(34, 197, 94, .3)
        }

        .header .bell-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            width: 18px;
            height: 18px;
            background: var(--red);
            border-radius: 50%;
            font-size: 10px;
            font-weight: 700;
            color: #fff;
            display: none;
            align-items: center;
            justify-content: center
        }

        .header .logo {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px
        }

        .header .info h1 {
            font-size: 15px;
            font-weight: 600
        }

        .header .status {
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 4px
        }

        .header .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            display: inline-block
        }

        .dot.green {
            background: var(--green);
            box-shadow: 0 0 6px var(--green)
        }

        .dot.red {
            background: var(--red)
        }

        /* Login */
        #login-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 32px;
            gap: 16px
        }

        #login-screen h2 {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent
        }

        #login-screen p {
            font-size: 13px;
            color: var(--muted)
        }

        #login-screen input {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 16px;
            color: var(--text);
            font-size: 15px;
            outline: none;
            width: 100%
        }

        #login-screen input:focus {
            border-color: var(--accent)
        }

        #login-screen button {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer
        }

        #login-screen button:disabled {
            opacity: .5
        }

        #login-error {
            color: var(--red);
            font-size: 13px;
            text-align: center;
            display: none
        }

        #login-info {
            color: var(--accent);
            font-size: 13px;
            text-align: center;
            display: none
        }

        /* Chat */
        #chat-screen {
            flex: 1;
            display: none;
            flex-direction: column;
            min-height: 0;
            overflow: hidden
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            -webkit-overflow-scrolling: touch;
            min-height: 0
        }

        .msg {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word
        }

        .msg.agent {
            background: var(--agent-bg);
            border: 1px solid rgba(99, 102, 241, .15);
            align-self: flex-start;
            border-bottom-left-radius: 4px
        }

        .msg.user {
            background: var(--user-bg);
            border: 1px solid rgba(6, 182, 212, .15);
            align-self: flex-end;
            border-bottom-right-radius: 4px
        }

        .msg .meta {
            font-size: 11px;
            color: var(--muted);
            margin-top: 4px
        }

        .msg .sender {
            font-size: 11px;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 2px
        }

        .msg.user .sender {
            color: var(--accent2)
        }

        /* Quick buttons */
        .quick-btns {
            display: flex;
            gap: 8px;
            padding: 8px 16px;
            overflow-x: auto;
            flex-shrink: 0
        }

        .quick-btns button {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 6px 14px;
            color: var(--text);
            font-size: 12px;
            white-space: nowrap;
            cursor: pointer;
            flex-shrink: 0
        }

        /* Input */
        .input-bar {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            background: rgba(10, 14, 26, .95);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
            align-items: flex-end
        }

        .input-bar textarea {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 10px 16px;
            color: var(--text);
            font-size: 14px;
            resize: none;
            outline: none;
            max-height: 80px;
            min-height: 40px;
            font-family: inherit;
            line-height: 1.4
        }

        .input-bar textarea:focus {
            border-color: var(--accent)
        }

        .input-bar button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0
        }

        .input-bar .clip-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            font-size: 16px
        }

        /* Upload preview */
        .upload-preview {
            display: none;
            padding: 8px 16px;
            background: rgba(10, 14, 26, .95);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
            align-items: center;
            gap: 10px
        }

        .upload-preview.active {
            display: flex
        }

        .upload-preview .thumb {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            object-fit: cover;
            background: var(--surface);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
            overflow: hidden
        }

        .upload-preview .thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover
        }

        .upload-preview .file-info {
            flex: 1;
            min-width: 0
        }

        .upload-preview .file-name {
            font-size: 12px;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .upload-preview .file-size {
            font-size: 11px;
            color: var(--muted)
        }

        .upload-preview .remove-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: none;
            color: var(--red);
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0
        }

        /* Media in messages */
        .msg .media-preview {
            margin-top: 8px;
            border-radius: 10px;
            overflow: hidden;
            max-width: 100%
        }

        .msg .media-preview img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 10px;
            cursor: pointer
        }

        .msg .media-preview video {
            max-width: 100%;
            max-height: 300px;
            border-radius: 10px
        }

        .msg .media-preview audio {
            width: 100%;
            margin-top: 4px
        }

        .msg .media-preview .file-link {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: rgba(255, 255, 255, .05);
            border-radius: 8px;
            color: var(--accent);
            font-size: 13px;
            text-decoration: none
        }

        /* Safe area */
        .safe-bottom {
            height: env(safe-area-inset-bottom, 0);
            flex-shrink: 0
        }
    </style>
</head>

<body>
    <div id="app">

        <!-- Login Screen -->
        <div id="login-screen">
            <div style="text-align:center;margin-bottom:20px">
                <div class="header" style="border:none;justify-content:center;padding:0;background:transparent">
                    <div class="logo">▲</div>
                </div>
            </div>
            <h2>Antigravity</h2>
            <p>Tu agente AI, en tu bolsillo</p>
            <input type="email" id="inp-email" placeholder="tu@email.com" autocomplete="email" />
            <input type="password" id="inp-pass" placeholder="Contraseña" autocomplete="current-password" />
            <div id="login-error"></div>
            <div id="login-info"></div>
            <button id="btn-login" onclick="doLogin()">Entrar</button>
        </div>

        <!-- Chat Screen -->
        <div id="chat-screen">
            <div class="header">
                <div class="logo">▲</div>
                <div class="info">
                    <h1>Hanibal's Space</h1>
                    <div class="status"><span class="dot" id="status-dot"></span> <span
                            id="status-text">Conectando...</span></div>
                </div>
                <button class="bell-btn" id="bell-btn" onclick="toggleNotifications()" title="Activar notificaciones">
                    🔕
                    <span class="bell-badge" id="bell-badge">0</span>
                </button>
            </div>
            <div id="messages"></div>
            <div class="quick-btns">
                <button onclick="sendQuick('estado')">📊 Estado</button>
                <button onclick="sendQuick('¿Qué haces?')">🤔 ¿Qué haces?</button>
                <button onclick="sendQuick('progreso')">📈 Progreso</button>
                <button onclick="sendQuick('pausa')">⏸ Pausa</button>
            </div>
            <div class="upload-preview" id="upload-preview">
                <div class="thumb" id="upload-thumb">📎</div>
                <div class="file-info">
                    <div class="file-name" id="upload-name">archivo.jpg</div>
                    <div class="file-size" id="upload-size">0 KB</div>
                </div>
                <button class="remove-btn" onclick="clearUpload()">✕</button>
            </div>
            <div class="input-bar">
                <button class="clip-btn" onclick="document.getElementById('file-input').click()"
                    title="Adjuntar archivo">📎</button>
                <input type="file" id="file-input" accept="image/*,audio/*,video/*,.pdf" style="display:none"
                    onchange="handleFileSelect(this)" />
                <textarea id="msg-input" placeholder="Escríbele a tu agente..." rows="1"
                    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
                <button onclick="sendMsg()">➤</button>
            </div>
            <div class="safe-bottom"></div>
        </div>

    </div>

    <script>
        // ─── Config ──────────────────────────────────────────────────────────────
        const API = './api.php';
        let token = localStorage.getItem('ag_token') || '';
        let lastTimestamp = 0;
        let pollTimer = null;
        let notificationsEnabled = localStorage.getItem('ag_notif') === 'true';
        let unreadCount = 0;
        let isPageVisible = true;

        // ─── Notification Sound (base64 short beep) ──────────────────────────────
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playNotifSound() {
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = 880;
                osc.type = 'sine';
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.3);
                // Second beep
                setTimeout(() => {
                    const osc2 = audioCtx.createOscillator();
                    const gain2 = audioCtx.createGain();
                    osc2.connect(gain2);
                    gain2.connect(audioCtx.destination);
                    osc2.frequency.value = 1100;
                    osc2.type = 'sine';
                    gain2.gain.setValueAtTime(0.3, audioCtx.currentTime);
                    gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                    osc2.start(audioCtx.currentTime);
                    osc2.stop(audioCtx.currentTime + 0.3);
                }, 150);
            } catch (e) { }
        }

        // ─── Notifications ───────────────────────────────────────────────────────
        function toggleNotifications() {
            if (!notificationsEnabled) {
                // Request permission
                if ('Notification' in window) {
                    Notification.requestPermission().then(perm => {
                        if (perm === 'granted') {
                            notificationsEnabled = true;
                            localStorage.setItem('ag_notif', 'true');
                            updateBellUI();
                            showToast('🔔 Notificaciones activadas');
                            // Resume audio context (needed for iOS)
                            audioCtx.resume();
                        } else {
                            showToast('⚠️ Permisos de notificación denegados');
                        }
                    });
                } else {
                    // Fallback: just enable sound
                    notificationsEnabled = true;
                    localStorage.setItem('ag_notif', 'true');
                    updateBellUI();
                    showToast('🔔 Sonido activado');
                    audioCtx.resume();
                }
            } else {
                notificationsEnabled = false;
                localStorage.setItem('ag_notif', 'false');
                updateBellUI();
                showToast('🔕 Notificaciones desactivadas');
            }
        }

        function updateBellUI() {
            const btn = document.getElementById('bell-btn');
            const badge = document.getElementById('bell-badge');
            btn.textContent = '';
            btn.innerHTML = (notificationsEnabled ? '🔔' : '🔕') +
                '<span class="bell-badge" id="bell-badge">' + unreadCount + '</span>';
            btn.className = 'bell-btn' + (notificationsEnabled ? ' active' : '');
            const b = document.getElementById('bell-badge');
            if (b) b.style.display = unreadCount > 0 ? 'flex' : 'none';
        }

        function notifyNewMessage(msg) {
            if (!notificationsEnabled) return;
            // Sound
            playNotifSound();
            // Vibrate
            if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
            // Browser notification (if page not visible)
            if (!isPageVisible && 'Notification' in window && Notification.permission === 'granted') {
                const n = new Notification('🤖 Antigravity', {
                    body: msg.content.substring(0, 100),
                    icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">▲</text></svg>',
                    tag: 'ag-msg-' + msg.timestamp,
                    renotify: true
                });
                n.onclick = () => { window.focus(); n.close(); };
            }
            // Badge
            if (!isPageVisible) {
                unreadCount++;
                updateBellUI();
                document.title = `(${unreadCount}) Antigravity`;
            }
        }

        function showToast(text) {
            const t = document.createElement('div');
            t.style.cssText = 'position:fixed;top:70px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:999;backdrop-filter:blur(10px);transition:opacity .3s';
            t.textContent = text;
            document.body.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 2000);
        }

        // Track page visibility
        document.addEventListener('visibilitychange', () => {
            isPageVisible = !document.hidden;
            if (isPageVisible) {
                unreadCount = 0;
                updateBellUI();
                document.title = 'Antigravity';
            }
        });

        // ─── Login ───────────────────────────────────────────────────────────────
        async function doLogin() {
            const btn = document.getElementById('btn-login');
            const errEl = document.getElementById('login-error');
            const infoEl = document.getElementById('login-info');
            btn.disabled = true;
            errEl.style.display = 'none';
            infoEl.style.display = 'none';

            const email = document.getElementById('inp-email').value;
            const pass = document.getElementById('inp-pass').value;

            if (!email || !pass) {
                errEl.textContent = 'Ingresa email y contraseña';
                errEl.style.display = 'block';
                btn.disabled = false;
                return;
            }

            // Show connecting message
            infoEl.textContent = '⏳ Conectando...';
            infoEl.style.display = 'block';

            try {
                const res = await fetch(API + '?action=login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password: pass })
                });
                const data = await res.json();
                if (data.success) {
                    token = data.token;
                    localStorage.setItem('ag_token', token);
                    showChat();
                } else {
                    errEl.textContent = data.error || 'Error de login';
                    errEl.style.display = 'block';
                }
            } catch (e) {
                errEl.textContent = '⚠️ No se pudo conectar al servidor';
                errEl.style.display = 'block';
            }
            infoEl.style.display = 'none';
            btn.disabled = false;
        }

        // ─── Chat ────────────────────────────────────────────────────────────────
        function showChat() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            loadMessages();
            startPolling();
            checkAgentStatus();
        }

        async function loadMessages() {
            try {
                const res = await fetch(API + '?action=inbox');
                const data = await res.json();
                const container = document.getElementById('messages');
                container.innerHTML = '';
                if (data.messages) {
                    data.messages.forEach(m => appendMessage(m));
                    if (data.messages.length > 0) {
                        lastTimestamp = data.messages[data.messages.length - 1].timestamp;
                    }
                }
                scrollBottom();
            } catch (e) {
                console.error('Load messages error:', e);
            }
        }

        function appendMessage(m) {
            const container = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'msg ' + m.role;
            let mediaHtml = '';
            if (m.attachment) {
                const a = m.attachment;
                if (a.type === 'image') {
                    mediaHtml = `<div class="media-preview"><img src="${a.url}" alt="${a.name || 'imagen'}" onclick="window.open(this.src)" /></div>`;
                } else if (a.type === 'video') {
                    mediaHtml = `<div class="media-preview"><video src="${a.url}" controls playsinline></video></div>`;
                } else if (a.type === 'audio') {
                    mediaHtml = `<div class="media-preview"><audio src="${a.url}" controls></audio></div>`;
                } else {
                    mediaHtml = `<div class="media-preview"><a class="file-link" href="${a.url}" target="_blank">📄 ${a.name || 'Archivo'}</a></div>`;
                }
            }
            div.innerHTML = `
    <div class="sender">${m.role === 'agent' ? '🟢 Antigravity' : '📱 Tú'}</div>
    ${m.content ? escapeHtml(m.content) : ''}${mediaHtml}
    <div class="meta">${m.time || ''}</div>
  `;
            container.appendChild(div);
        }

        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
        }

        function scrollBottom() {
            const c = document.getElementById('messages');
            setTimeout(() => c.scrollTop = c.scrollHeight, 50);
        }

        // ─── File handling ───────────────────────────────────────────────────────
        let pendingFile = null;

        function handleFileSelect(input) {
            const file = input.files[0];
            if (!file) return;
            if (file.size > 10 * 1024 * 1024) {
                showToast('⚠️ Archivo muy grande (máx 10MB)');
                input.value = '';
                return;
            }
            pendingFile = file;
            const preview = document.getElementById('upload-preview');
            const thumb = document.getElementById('upload-thumb');
            const name = document.getElementById('upload-name');
            const size = document.getElementById('upload-size');

            name.textContent = file.name;
            size.textContent = (file.size / 1024).toFixed(1) + ' KB';

            if (file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = e => { thumb.innerHTML = `<img src="${e.target.result}" />`; };
                reader.readAsDataURL(file);
            } else if (file.type.startsWith('video/')) {
                thumb.innerHTML = '🎥';
            } else if (file.type.startsWith('audio/')) {
                thumb.innerHTML = '🎧';
            } else {
                thumb.innerHTML = '📄';
            }
            preview.classList.add('active');
            input.value = '';
        }

        function clearUpload() {
            pendingFile = null;
            document.getElementById('upload-preview').classList.remove('active');
            document.getElementById('upload-thumb').innerHTML = '📎';
        }

        // ─── Send ────────────────────────────────────────────────────────────────
        async function sendMsg() {
            const input = document.getElementById('msg-input');
            const content = input.value.trim();
            if (!content && !pendingFile) return;
            input.value = '';
            input.style.height = 'auto';

            let attachment = null;

            // Upload file first if pending
            if (pendingFile) {
                showToast('⬆️ Subiendo archivo...');
                try {
                    const formData = new FormData();
                    formData.append('file', pendingFile);
                    formData.append('token', token);
                    formData.append('role', 'user');
                    const uploadRes = await fetch(API + '?action=upload', {
                        method: 'POST',
                        body: formData
                    });
                    const uploadData = await uploadRes.json();
                    if (uploadData.success) {
                        attachment = {
                            url: uploadData.file.url,
                            type: uploadData.file.type,
                            name: uploadData.file.name,
                            mime: uploadData.file.mime
                        };
                        showToast('✅ Archivo subido');
                    } else {
                        showToast('⚠️ Error: ' + (uploadData.error || 'fallo'));
                        clearUpload();
                        return;
                    }
                } catch (e) {
                    showToast('⚠️ Error subiendo archivo');
                    clearUpload();
                    return;
                }
                clearUpload();
            }

            // Optimistic UI
            const timeStr = new Date().toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
            appendMessage({ role: 'user', content: content || '', time: timeStr, attachment });
            scrollBottom();

            try {
                const body = { action: 'send', content: content || '', role: 'user', token };
                if (attachment) body.attachment = attachment;
                await fetch(API + '?action=send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
            } catch (e) {
                appendMessage({ role: 'agent', content: '⚠️ Error enviando mensaje', time: '' });
            }
        }

        function sendQuick(text) {
            document.getElementById('msg-input').value = text;
            sendMsg();
        }

        // ─── Polling ─────────────────────────────────────────────────────────────
        function startPolling() {
            if (pollTimer) clearInterval(pollTimer);
            pollTimer = setInterval(pollNewMessages, 3000);
        }

        async function pollNewMessages() {
            try {
                const res = await fetch(API + `?action=inbox&since=${lastTimestamp}&role=agent`);
                const data = await res.json();
                if (data.messages && data.messages.length > 0) {
                    data.messages.forEach(m => {
                        appendMessage(m);
                        notifyNewMessage(m);
                    });
                    lastTimestamp = data.messages[data.messages.length - 1].timestamp;
                    scrollBottom();
                }
            } catch (e) { }
        }

        // ─── Agent status ────────────────────────────────────────────────────────
        async function checkAgentStatus() {
            try {
                const res = await fetch(API + '?action=agent_status');
                const data = await res.json();
                const dot = document.getElementById('status-dot');
                const txt = document.getElementById('status-text');
                if (data.online) {
                    dot.className = 'dot green';
                    txt.textContent = 'Agente activo';
                } else {
                    dot.className = 'dot red';
                    txt.textContent = 'Agente desconectado';
                }
            } catch (e) {
                document.getElementById('status-dot').className = 'dot red';
                document.getElementById('status-text').textContent = 'Sin conexión';
            }
            // Re-check every 30s
            setTimeout(checkAgentStatus, 30000);
        }

        // ─── Auto-login if token exists ──────────────────────────────────────────
        if (token) {
            showChat();
        }

        // Init bell UI
        updateBellUI();

        // Auto-resize textarea
        document.getElementById('msg-input')?.addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 80) + 'px';
        });
    </script>
</body>

</html>
