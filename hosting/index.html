<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Antigravity</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --bg: #0a0e1a;
            --surface: rgba(255, 255, 255, .06);
            --border: rgba(255, 255, 255, .08);
            --text: #e2e8f0;
            --muted: #94a3b8;
            --accent: #818cf8;
            --accent2: #06b6d4;
            --agent-bg: rgba(99, 102, 241, .1);
            --user-bg: rgba(6, 182, 212, .15);
            --green: #22c55e;
            --red: #ef4444;
        }

        html,
        body {
            height: 100%;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100%;
            max-width: 500px;
            margin: 0 auto
        }

        /* Header */
        .header {
            padding: 12px 16px;
            background: rgba(10, 14, 26, .95);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(20px);
            z-index: 10
        }

        .header .logo {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px
        }

        .header .info h1 {
            font-size: 15px;
            font-weight: 600
        }

        .header .status {
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 4px
        }

        .header .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            display: inline-block
        }

        .dot.green {
            background: var(--green);
            box-shadow: 0 0 6px var(--green)
        }

        .dot.red {
            background: var(--red)
        }

        /* Login */
        #login-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 32px;
            gap: 16px
        }

        #login-screen h2 {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent
        }

        #login-screen p {
            font-size: 13px;
            color: var(--muted)
        }

        #login-screen input {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 16px;
            color: var(--text);
            font-size: 15px;
            outline: none;
            width: 100%
        }

        #login-screen input:focus {
            border-color: var(--accent)
        }

        #login-screen button {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer
        }

        #login-screen button:disabled {
            opacity: .5
        }

        #login-error {
            color: var(--red);
            font-size: 13px;
            text-align: center;
            display: none
        }

        #login-info {
            color: var(--accent);
            font-size: 13px;
            text-align: center;
            display: none
        }

        /* Chat */
        #chat-screen {
            flex: 1;
            display: none;
            flex-direction: column
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            -webkit-overflow-scrolling: touch
        }

        .msg {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word
        }

        .msg.agent {
            background: var(--agent-bg);
            border: 1px solid rgba(99, 102, 241, .15);
            align-self: flex-start;
            border-bottom-left-radius: 4px
        }

        .msg.user {
            background: var(--user-bg);
            border: 1px solid rgba(6, 182, 212, .15);
            align-self: flex-end;
            border-bottom-right-radius: 4px
        }

        .msg .meta {
            font-size: 11px;
            color: var(--muted);
            margin-top: 4px
        }

        .msg .sender {
            font-size: 11px;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 2px
        }

        .msg.user .sender {
            color: var(--accent2)
        }

        /* Quick buttons */
        .quick-btns {
            display: flex;
            gap: 8px;
            padding: 8px 16px;
            overflow-x: auto;
            flex-shrink: 0
        }

        .quick-btns button {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 6px 14px;
            color: var(--text);
            font-size: 12px;
            white-space: nowrap;
            cursor: pointer;
            flex-shrink: 0
        }

        /* Input */
        .input-bar {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            background: rgba(10, 14, 26, .95);
            border-top: 1px solid var(--border);
            flex-shrink: 0
        }

        .input-bar textarea {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 10px 16px;
            color: var(--text);
            font-size: 14px;
            resize: none;
            outline: none;
            max-height: 80px;
            min-height: 40px;
            font-family: inherit;
            line-height: 1.4
        }

        .input-bar textarea:focus {
            border-color: var(--accent)
        }

        .input-bar button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0
        }

        /* Safe area */
        .safe-bottom {
            height: env(safe-area-inset-bottom, 0);
            flex-shrink: 0
        }
    </style>
</head>

<body>
    <div id="app">

        <!-- Login Screen -->
        <div id="login-screen">
            <div style="text-align:center;margin-bottom:20px">
                <div class="header" style="border:none;justify-content:center;padding:0;background:transparent">
                    <div class="logo">▲</div>
                </div>
            </div>
            <h2>Antigravity</h2>
            <p>Tu agente AI, en tu bolsillo</p>
            <input type="email" id="inp-email" placeholder="tu@email.com" autocomplete="email" />
            <input type="password" id="inp-pass" placeholder="Contraseña" autocomplete="current-password" />
            <div id="login-error"></div>
            <div id="login-info"></div>
            <button id="btn-login" onclick="doLogin()">Entrar</button>
        </div>

        <!-- Chat Screen -->
        <div id="chat-screen">
            <div class="header">
                <div class="logo">▲</div>
                <div class="info">
                    <h1>Hanibal's Space</h1>
                    <div class="status"><span class="dot" id="status-dot"></span> <span
                            id="status-text">Conectando...</span></div>
                </div>
            </div>
            <div id="messages"></div>
            <div class="quick-btns">
                <button onclick="sendQuick('estado')">📊 Estado</button>
                <button onclick="sendQuick('¿Qué haces?')">🤔 ¿Qué haces?</button>
                <button onclick="sendQuick('progreso')">📈 Progreso</button>
                <button onclick="sendQuick('pausa')">⏸ Pausa</button>
            </div>
            <div class="input-bar">
                <textarea id="msg-input" placeholder="Escríbele a tu agente..." rows="1"
                    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
                <button onclick="sendMsg()">➤</button>
            </div>
            <div class="safe-bottom"></div>
        </div>

    </div>

    <script>
        // ─── Config ──────────────────────────────────────────────────────────────
        const API = './api.php';
        let token = localStorage.getItem('ag_token') || '';
        let lastTimestamp = 0;
        let pollTimer = null;

        // ─── Login ───────────────────────────────────────────────────────────────
        async function doLogin() {
            const btn = document.getElementById('btn-login');
            const errEl = document.getElementById('login-error');
            const infoEl = document.getElementById('login-info');
            btn.disabled = true;
            errEl.style.display = 'none';
            infoEl.style.display = 'none';

            const email = document.getElementById('inp-email').value;
            const pass = document.getElementById('inp-pass').value;

            if (!email || !pass) {
                errEl.textContent = 'Ingresa email y contraseña';
                errEl.style.display = 'block';
                btn.disabled = false;
                return;
            }

            // Show connecting message
            infoEl.textContent = '⏳ Conectando...';
            infoEl.style.display = 'block';

            try {
                const res = await fetch(API + '?action=login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password: pass })
                });
                const data = await res.json();
                if (data.success) {
                    token = data.token;
                    localStorage.setItem('ag_token', token);
                    showChat();
                } else {
                    errEl.textContent = data.error || 'Error de login';
                    errEl.style.display = 'block';
                }
            } catch (e) {
                errEl.textContent = '⚠️ No se pudo conectar al servidor';
                errEl.style.display = 'block';
            }
            infoEl.style.display = 'none';
            btn.disabled = false;
        }

        // ─── Chat ────────────────────────────────────────────────────────────────
        function showChat() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            loadMessages();
            startPolling();
            checkAgentStatus();
        }

        async function loadMessages() {
            try {
                const res = await fetch(API + '?action=inbox');
                const data = await res.json();
                const container = document.getElementById('messages');
                container.innerHTML = '';
                if (data.messages) {
                    data.messages.forEach(m => appendMessage(m));
                    if (data.messages.length > 0) {
                        lastTimestamp = data.messages[data.messages.length - 1].timestamp;
                    }
                }
                scrollBottom();
            } catch (e) {
                console.error('Load messages error:', e);
            }
        }

        function appendMessage(m) {
            const container = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'msg ' + m.role;
            div.innerHTML = `
    <div class="sender">${m.role === 'agent' ? '🟢 Antigravity' : '📱 Tú'}</div>
    ${escapeHtml(m.content)}
    <div class="meta">${m.time || ''}</div>
  `;
            container.appendChild(div);
        }

        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
        }

        function scrollBottom() {
            const c = document.getElementById('messages');
            setTimeout(() => c.scrollTop = c.scrollHeight, 50);
        }

        // ─── Send ────────────────────────────────────────────────────────────────
        async function sendMsg() {
            const input = document.getElementById('msg-input');
            const content = input.value.trim();
            if (!content) return;
            input.value = '';
            input.style.height = 'auto';

            // Optimistic UI
            appendMessage({ role: 'user', content, time: new Date().toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' }) });
            scrollBottom();

            try {
                await fetch(API + '?action=send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'send', content, role: 'user', token })
                });
            } catch (e) {
                appendMessage({ role: 'agent', content: '⚠️ Error enviando mensaje', time: '' });
            }
        }

        function sendQuick(text) {
            document.getElementById('msg-input').value = text;
            sendMsg();
        }

        // ─── Polling ─────────────────────────────────────────────────────────────
        function startPolling() {
            if (pollTimer) clearInterval(pollTimer);
            pollTimer = setInterval(pollNewMessages, 3000);
        }

        async function pollNewMessages() {
            try {
                const res = await fetch(API + `?action=inbox&since=${lastTimestamp}&role=agent`);
                const data = await res.json();
                if (data.messages && data.messages.length > 0) {
                    data.messages.forEach(m => appendMessage(m));
                    lastTimestamp = data.messages[data.messages.length - 1].timestamp;
                    scrollBottom();
                }
            } catch (e) { }
        }

        // ─── Agent status ────────────────────────────────────────────────────────
        async function checkAgentStatus() {
            try {
                const res = await fetch(API + '?action=agent_status');
                const data = await res.json();
                const dot = document.getElementById('status-dot');
                const txt = document.getElementById('status-text');
                if (data.online) {
                    dot.className = 'dot green';
                    txt.textContent = 'Agente activo';
                } else {
                    dot.className = 'dot red';
                    txt.textContent = 'Agente desconectado';
                }
            } catch (e) {
                document.getElementById('status-dot').className = 'dot red';
                document.getElementById('status-text').textContent = 'Sin conexión';
            }
            // Re-check every 30s
            setTimeout(checkAgentStatus, 30000);
        }

        // ─── Auto-login if token exists ──────────────────────────────────────────
        if (token) {
            showChat();
        }

        // Auto-resize textarea
        document.getElementById('msg-input')?.addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 80) + 'px';
        });
    </script>
</body>

</html>
