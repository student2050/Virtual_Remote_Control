<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#0d0d24"/>
    </linearGradient>
    <linearGradient id="rocket" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" style="stop-color:#6c5ce7"/>
      <stop offset="100%" style="stop-color:#00cec9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <g transform="translate(256,256)" filter="url(#glow)">
    <text font-size="220" text-anchor="middle" dominant-baseline="central" fill="url(#rocket)">🚀</text>
  </g>
  <rect width="512" height="512" rx="80" fill="none" stroke="rgba(108,92,231,0.2)" stroke-width="2"/>
</svg>
